name: Daily AI Brief

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  models: read

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      MAIL_TO: ${{ secrets.MAIL_TO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODELS_MODEL: openai/gpt-4o-mini
          NEWS_LIMIT: '8'
          REPO_LIMIT: '5'
        run: python scripts/generate_daily_report.py

      - name: Send report email
        if: ${{ env.SMTP_USER != '' && env.SMTP_PASS != '' && env.MAIL_TO != '' }}
        env:
          MAIL_SUBJECT: AI 日报 - ${{ github.run_started_at }}
        run: python scripts/send_email_report.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/daily latest.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "docs: update AI daily brief"
          git push
